name: vegan_motivation_app
description: "VeganKit — daily vegan motivation, quotes, and habit tracking. Offline-first, no account needed."
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.41

  # Navigation
  go_router: ^16.2.4

  # Preferences
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

  # Home-screen widget
  # Pinned below 0.8.x: 0.8 pulls androidx.compose.remote (alpha) which
  # requires AGP 9.1; this project is on the Flutter-default AGP 8.x.
  home_widget: ^0.7.0

  # Sharing
  share_plus: ^12.0.1
  path_provider: ^2.1.5

  # Celebration
  confetti: ^0.8.0

  # Misc
  intl: ^0.20.2
  window_manager: ^0.5.1
  purchases_flutter: ^10.2.3
  # RevenueCat hosted Paywalls UI — must track the purchases_flutter major (10).
  purchases_ui_flutter: ^10.2.3
  in_app_review: ^2.0.12
  url_launcher: ^6.3.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.2
  build_runner: ^2.7.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "#1F4D36"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#1F4D36"
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  # Generate AppLocalizations from lib/l10n/*.arb (see l10n.yaml).
  generate: true

  assets:
    - assets/content/
    - assets/critters/
    - assets/images/backgrounds/why_vegan/
    - assets/images/backgrounds/quick_tips/
    - assets/images/backgrounds/youre_awesome/
    - assets/images/backgrounds/facts/
    - assets/images/backgrounds/staying_strong/
    - assets/images/backgrounds/milestones/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces/Fraunces-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces/Fraunces-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fraunces/Fraunces-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fraunces/Fraunces-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
