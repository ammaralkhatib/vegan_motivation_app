name: vegan_motivation_app
description: "Veggie — daily vegan motivation, quotes, and habit tracking. Offline-first, no account needed."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.41

  # Navigation
  go_router: ^16.2.4

  # Preferences
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

  # Home-screen widget
  home_widget: ^0.8.0

  # Sharing
  share_plus: ^12.0.1
  path_provider: ^2.1.5

  # Celebration
  confetti: ^0.8.0

  # Misc
  intl: ^0.20.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.2
  build_runner: ^2.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/content/

  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces/Fraunces-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces/Fraunces-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fraunces/Fraunces-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fraunces/Fraunces-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
